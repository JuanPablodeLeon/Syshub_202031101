version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: syshub_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: syshub_db_crud
      MYSQL_USER: user_syshub
      MYSQL_PASSWORD: root_syshub
    volumes:
      - mysql_data:/var/lib/mysql   # <--- cambia aquí
    ports:
      - "3307:3306"

volumes:                           # <--- agregado al final
  mysql_data: